<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>VisionIA — Cámara</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0e0e10;--s:#17171a;--s2:#1f1f24;
      --bd:rgba(255,255,255,.08);--bdh:rgba(255,255,255,.18);
      --tx:#f0eff2;--mu:#8b8a95;--fa:#55545e;
      --ac:#7c6af7;--acl:rgba(124,106,247,.15);
      --gn:#3ecf8e;--rd:#f66;--or:#f5a623;
      --r:14px;--rs:10px;
    }
    html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,'Inter',sans-serif;overflow:hidden}

    /* ── LAYOUT ── */
    .app{display:flex;flex-direction:column;height:100%;height:100dvh}

    /* ── HEADER ── */
    header{
      padding:env(safe-area-inset-top,12px) 16px 12px;
      background:rgba(14,14,16,.92);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--bd);
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
    }
    .logo{font-size:1.05rem;font-weight:600;letter-spacing:-.01em}
    .logo b{color:var(--ac)}
    .status-pill{
      display:flex;align-items:center;gap:6px;
      font-size:11px;color:var(--mu);
      background:var(--s);border:1px solid var(--bd);
      border-radius:20px;padding:4px 11px;
    }
    .dot{width:7px;height:7px;border-radius:50%;background:var(--fa);flex-shrink:0;transition:background .3s}
    .dot.on{background:var(--gn);box-shadow:0 0 6px var(--gn)}
    .dot.err{background:var(--rd);box-shadow:0 0 6px var(--rd)}
    .dot.wait{background:var(--or);animation:pulse 1.2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── VIEWFINDER ── */
    .viewfinder-wrap{
      flex:1;position:relative;overflow:hidden;background:#000;
      display:flex;align-items:center;justify-content:center;
    }
    video{
      width:100%;height:100%;object-fit:cover;
      transform:scaleX(-1);
    }
    video.rear{transform:none}
    canvas#snap{display:none}

    .overlay{
      position:absolute;inset:0;pointer-events:none;
      display:flex;flex-direction:column;justify-content:space-between;
      padding:14px;
    }
    .overlay-top{display:flex;justify-content:space-between;align-items:flex-start}
    .overlay-bot{display:flex;justify-content:center}

    .badge{
      background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.12);border-radius:20px;
      padding:4px 12px;font-size:11px;color:#fff;display:flex;align-items:center;gap:5px;
    }
    .badge.rec .recdot{width:6px;height:6px;border-radius:50%;background:var(--rd);animation:pulse 1s infinite;display:inline-block}
    .fps-num{font-weight:600;color:var(--gn)}
    .size-num{color:var(--mu)}

    .placeholder{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:10px;
      background:var(--s);color:var(--fa);text-align:center;padding:2rem;
    }
    .placeholder .ico{font-size:48px}
    .placeholder p{font-size:14px;line-height:1.6}

    .thumb-wrap{
      position:absolute;bottom:16px;right:16px;
      width:60px;height:45px;border-radius:8px;overflow:hidden;
      border:2px solid rgba(255,255,255,.2);opacity:.85;
    }
    .thumb-wrap img{width:100%;height:100%;object-fit:cover}

    .flash{
      position:absolute;inset:0;background:#fff;opacity:0;
      pointer-events:none;transition:opacity .05s;border-radius:0;
    }
    .flash.go{opacity:.35}

    /* ── TEMPORIZADOR OVERLAY ── */
    .timer-overlay{
      position:absolute;inset:0;pointer-events:none;
      display:flex;align-items:center;justify-content:center;
      z-index:10;
    }
    .timer-ring-wrap{
      position:relative;width:140px;height:140px;
      display:flex;align-items:center;justify-content:center;
    }
    .timer-svg{position:absolute;inset:0;transform:rotate(-90deg)}
    .timer-track{fill:none;stroke:rgba(255,255,255,.12);stroke-width:6}
    .timer-arc{
      fill:none;stroke:var(--ac);stroke-width:6;
      stroke-linecap:round;
      stroke-dasharray:408;
      stroke-dashoffset:0;
      transition:stroke-dashoffset .9s linear, stroke .4s;
    }
    .timer-arc.urgent{stroke:var(--or)}
    .timer-arc.critical{stroke:var(--rd)}
    .timer-num{
      font-size:48px;font-weight:700;color:#fff;
      text-shadow:0 2px 12px rgba(0,0,0,.8);
      font-variant-numeric:tabular-nums;line-height:1;
      position:relative;z-index:1;
    }
    .timer-num.urgent{color:var(--or)}
    .timer-num.critical{color:var(--rd)}
    .timer-label{
      position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);
      font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
      color:rgba(255,255,255,.5);white-space:nowrap;
    }
    .timer-overlay.hidden{display:none}

    /* ── CONTROLS ── */
    .controls{
      flex-shrink:0;
      background:rgba(14,14,16,.97);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-top:1px solid var(--bd);
      padding:14px 16px calc(14px + env(safe-area-inset-bottom,0px));
    }

    /* ── INTERVALO (más notorio) ── */
    .interval-card{
      background:var(--s2);
      border:1.5px solid rgba(124,106,247,.35);
      border-radius:var(--r);
      padding:12px 14px;
      margin-bottom:14px;
    }
    .interval-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:10px;
    }
    .interval-title{
      display:flex;align-items:center;gap:7px;
      font-size:12px;font-weight:600;color:var(--tx);
    }
    .interval-title .ico{font-size:16px}
    .interval-badge{
      font-size:20px;font-weight:700;color:var(--ac);
      font-variant-numeric:tabular-nums;
      background:var(--acl);border:1px solid rgba(124,106,247,.3);
      border-radius:8px;padding:2px 10px;
      min-width:68px;text-align:center;
      line-height:1.3;
    }
    input[type=range]{
      width:100%;-webkit-appearance:none;appearance:none;
      height:5px;background:var(--s);border-radius:4px;outline:none;
      border:1px solid var(--bd);
    }
    input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:26px;height:26px;border-radius:50%;
      background:var(--ac);border:3px solid rgba(124,106,247,.6);
      box-shadow:0 0 0 4px rgba(124,106,247,.15);
      cursor:pointer;
    }
    .interval-ticks{
      display:flex;justify-content:space-between;
      margin-top:5px;padding:0 2px;
    }
    .interval-ticks span{
      font-size:9px;color:var(--fa);
    }

    /* ── BOTÓN SHOOT (GRANDE) ── */
    .ctrl-main{display:flex;align-items:center;gap:16px;margin-bottom:14px}
    .btn-shoot-wrap{position:relative;flex-shrink:0}
    .btn-shoot{
      width:88px;height:88px;border-radius:50%;
      background:var(--ac);
      border:4px solid rgba(124,106,247,.45);
      box-shadow:
        0 0 0 8px rgba(124,106,247,.12),
        0 4px 24px rgba(124,106,247,.45);
      display:flex;align-items:center;justify-content:center;
      font-size:36px;cursor:pointer;
      transition:transform .08s,box-shadow .08s,background .15s;
      -webkit-user-select:none;user-select:none;
      position:relative;
    }
    .btn-shoot:active{
      transform:scale(.91);
      box-shadow:0 0 0 4px rgba(124,106,247,.1),0 2px 8px rgba(124,106,247,.3);
    }
    .btn-shoot.sending{background:var(--or);box-shadow:0 0 0 8px rgba(245,166,35,.12),0 4px 24px rgba(245,166,35,.4)}
    .btn-shoot.error{background:var(--rd);box-shadow:0 0 0 8px rgba(246,102,102,.12),0 4px 24px rgba(246,102,102,.4)}
    .btn-shoot.auto{
      background:var(--gn);border-color:rgba(62,207,142,.4);
      animation:breathe 2s infinite;
      box-shadow:0 0 0 8px rgba(62,207,142,.12),0 4px 24px rgba(62,207,142,.4);
    }
    @keyframes breathe{0%,100%{box-shadow:0 0 0 8px rgba(62,207,142,.12),0 4px 24px rgba(62,207,142,.3)}50%{box-shadow:0 0 0 16px rgba(62,207,142,.05),0 4px 32px rgba(62,207,142,.5)}}

    /* Etiqueta debajo del botón */
    .btn-label{
      position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
      font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
      color:var(--mu);white-space:nowrap;
    }

    .info-col{flex:1;min-width:0}
    .info-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .mode-label{font-size:13px;font-weight:700;color:var(--tx)}
    .user-tag{font-size:11px;color:var(--ac);background:var(--acl);border:1px solid rgba(124,106,247,.3);padding:2px 9px;border-radius:20px}

    .stats-row{display:flex;gap:10px}
    .stat{text-align:center}
    .stat-v{font-size:17px;font-weight:700;color:var(--tx)}
    .stat-l{font-size:9px;color:var(--fa);text-transform:uppercase;letter-spacing:.06em}

    /* ── OPCIONES ── */
    .opts-row{display:flex;gap:7px;margin-bottom:10px}
    .opt-btn{
      flex:1;padding:9px 6px;border-radius:var(--rs);
      border:1px solid var(--bd);background:var(--s);
      color:var(--mu);font-size:11px;font-family:inherit;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      transition:all .15s;-webkit-user-select:none;user-select:none;
    }
    .opt-btn:active{opacity:.7;transform:scale(.96)}
    .opt-btn.active{background:var(--acl);border-color:rgba(124,106,247,.4);color:var(--ac)}
    .opt-btn .ico{font-size:18px}
    .opt-btn .lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

    /* ── CONFIG (más discreta) ── */
    .cfg-toggle{
      width:100%;text-align:center;background:none;border:none;
      color:var(--fa);font-size:10px;font-family:inherit;cursor:pointer;
      padding:5px 0 2px;
      display:flex;align-items:center;justify-content:center;gap:4px;
      opacity:.6;transition:opacity .2s;
    }
    .cfg-toggle:hover{opacity:1}
    .cfg-toggle .cfg-arr{font-size:9px;transition:transform .2s}
    .cfg-toggle.open .cfg-arr{transform:rotate(90deg)}
    .cfg-panel{
      display:none;margin-top:8px;
      background:var(--s);border:1px solid var(--bd);border-radius:var(--rs);
      padding:10px;flex-direction:column;gap:7px;
    }
    .cfg-panel.open{display:flex}
    .cfg-field{display:flex;flex-direction:column;gap:3px}
    .cfg-field label{font-size:10px;color:var(--fa);text-transform:uppercase;letter-spacing:.06em}
    .cfg-field input,.cfg-field select{
      background:var(--s2);border:1px solid var(--bd);border-radius:8px;
      padding:7px 10px;font-size:12px;font-family:monospace;color:var(--tx);
      outline:none;width:100%;
    }
    .cfg-field input:focus,.cfg-field select:focus{border-color:var(--bdh)}
    .cfg-btns{display:flex;gap:7px}
    .cfg-btn{
      flex:1;padding:7px;border-radius:var(--rs);
      border:1px solid rgba(124,106,247,.35);background:var(--acl);
      color:var(--ac);font-size:11px;font-family:inherit;cursor:pointer;
      transition:background .15s;
    }
    .cfg-btn:active{background:rgba(124,106,247,.25)}
    .cfg-btn.sec{border-color:var(--bd);background:var(--s2);color:var(--mu)}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:calc(16px + env(safe-area-inset-bottom,0px));
      left:50%;transform:translateX(-50%) translateY(80px);
      background:rgba(30,30,35,.95);backdrop-filter:blur(12px);
      border:1px solid var(--bd);border-radius:20px;
      padding:9px 18px;font-size:12px;color:var(--tx);
      white-space:nowrap;transition:transform .25s cubic-bezier(.34,1.56,.64,1);
      z-index:999;pointer-events:none;
    }
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">Vision<b>IA</b></div>
    <div class="status-pill">
      <span class="dot" id="connDot"></span>
      <span id="connTxt">Desconectado</span>
    </div>
  </header>

  <!-- ── VIEWFINDER ── -->
  <div class="viewfinder-wrap" id="vfWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="snap"></canvas>

    <div class="placeholder" id="placeholder">
      <div class="ico">📷</div>
      <p>Toca <strong>Iniciar cámara</strong><br>para comenzar a capturar</p>
    </div>

    <div class="overlay" id="overlay" style="display:none">
      <div class="overlay-top">
        <div class="badge rec" id="recBadge" style="display:none">
          <span class="recdot"></span><span id="recLabel">AUTO</span>
        </div>
        <div class="badge" id="fpsBadge">
          <span class="fps-num" id="fpsVal">—</span>
          <span style="color:var(--fa)">fps</span>
          &nbsp;
          <span class="size-num" id="sizeVal">—</span>
        </div>
      </div>
      <div class="overlay-bot"></div>
    </div>

    <!-- Temporizador de pregunta -->
    <div class="timer-overlay hidden" id="timerOverlay">
      <div class="timer-ring-wrap">
        <svg class="timer-svg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
          <circle class="timer-track" cx="70" cy="70" r="65"/>
          <circle class="timer-arc" id="timerArc" cx="70" cy="70" r="65"/>
        </svg>
        <span class="timer-num" id="timerNum">30</span>
        <span class="timer-label">seg restantes</span>
      </div>
    </div>

    <div class="thumb-wrap" id="thumbWrap" style="display:none">
      <img id="thumbImg" alt="última"/>
    </div>

    <div class="flash" id="flash"></div>
  </div>

  <!-- ── CONTROLS ── -->
  <div class="controls">

    <!-- Intervalo (tarjeta prominente) -->
    <div class="interval-card">
      <div class="interval-header">
        <div class="interval-title">
          <span class="ico">⏱</span>
          <span>Intervalo de captura</span>
        </div>
        <div class="interval-badge" id="intervalVal">1.0 s</div>
      </div>
      <input type="range" id="intervalSlider" min="200" max="5000" step="100" value="1000"
             oninput="onIntervalChange(this.value)"/>
      <div class="interval-ticks">
        <span>0.2s</span><span>1s</span><span>2s</span><span>3s</span><span>4s</span><span>5s</span>
      </div>
    </div>

    <!-- Main row -->
    <div class="ctrl-main">
      <div class="btn-shoot-wrap">
        <button class="btn-shoot" id="btnShoot" onclick="onShoot()">📷</button>
        <span class="btn-label" id="btnLabel">Capturar</span>
      </div>
      <div class="info-col">
        <div class="info-row">
          <span class="mode-label" id="modeLabel">Manual</span>
          <span class="user-tag" id="userTag">U1</span>
        </div>
        <div class="stats-row">
          <div class="stat"><div class="stat-v" id="stSent">0</div><div class="stat-l">Enviadas</div></div>
          <div class="stat"><div class="stat-v" id="stOk">0</div><div class="stat-l">OK</div></div>
          <div class="stat"><div class="stat-v" id="stErr">0</div><div class="stat-l">Err</div></div>
          <div class="stat"><div class="stat-v" id="stKb">—</div><div class="stat-l">KB</div></div>
        </div>
      </div>
    </div>

    <!-- Opciones -->
    <div class="opts-row">
      <button class="opt-btn" id="optCam" onclick="toggleCamera()">
        <span class="ico">🔄</span><span class="lbl">Cámara</span>
      </button>
      <button class="opt-btn" id="optAuto" onclick="toggleAuto()">
        <span class="ico" id="autoIco">▶️</span><span class="lbl">Auto</span>
      </button>
      <button class="opt-btn" id="optQ" onclick="cycleQuality()">
        <span class="ico">🎯</span><span class="lbl" id="qLabel">Alta</span>
      </button>
      <button class="opt-btn" id="optUser" onclick="cycleUser()">
        <span class="ico">👤</span><span class="lbl" id="uLabel">U1</span>
      </button>
    </div>

    <!-- Config (muy discreta) -->
    <button class="cfg-toggle" id="cfgToggleBtn" onclick="toggleCfg()">
      <span class="cfg-arr">▸</span>
      <span>Configuración avanzada</span>
    </button>
    <div class="cfg-panel" id="cfgPanel">
      <div class="cfg-field">
        <label>Protocolo</label>
        <select id="protoSel">
          <option value="ws">WebSocket (más rápido)</option>
          <option value="http">HTTP POST (compatible)</option>
        </select>
      </div>
      <div class="cfg-btns">
        <button class="cfg-btn" onclick="connect()">⚡ Reconectar</button>
        <button class="cfg-btn sec" onclick="initCamera()">📷 Cámara</button>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════════════
const S = {
  cameraReady: false,
  facingFront: true,
  stream: null,
  ws: null,
  wsReady: false,
  autoMode: false,
  autoTimer: null,
  interval: 1000,
  quality: 0.82,
  qualityLabel: 'Alta',
  user: 1,
  protocol: 'ws',
  srvUrl: '',
  sent: 0, ok: 0, err: 0,
  lastSendTime: 0,
  fpsTimes: [],
  deviceName: navigator.userAgent.includes('iPhone') ? 'iPhone' : 'iOS',
  pendingSend: false,
  lastKB: 0,
  targetMaxKB: 150,
};

// ── TEMPORIZADOR ──
const TIMER_DURATION = 30;  // segundos
const TIMER_CIRCUMFERENCE = 2 * Math.PI * 65; // ~408.41
let timerValue = TIMER_DURATION;
let timerInterval = null;
let timerActive = false;
let lastQuizQnum = null; // para detectar pregunta nueva

const QUALITY_LEVELS = [
  { label:'Ultra', q:0.95, maxW:1920 },
  { label:'Alta',  q:0.82, maxW:1280 },
  { label:'Media', q:0.65, maxW:960  },
  { label:'Rápida',q:0.45, maxW:720  },
];
let qualIdx = 1;

// ═══════════════════════════════════════════════════
//  TEMPORIZADOR
// ═══════════════════════════════════════════════════
function startTimer() {
  stopTimer();
  timerValue = TIMER_DURATION;
  timerActive = true;
  document.getElementById('timerOverlay').classList.remove('hidden');
  updateTimerUI();
  timerInterval = setInterval(() => {
    timerValue--;
    updateTimerUI();
    if (timerValue <= 0) stopTimer();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerActive = false;
  document.getElementById('timerOverlay').classList.add('hidden');
}

function updateTimerUI() {
  const arc = document.getElementById('timerArc');
  const num = document.getElementById('timerNum');
  const fraction = timerValue / TIMER_DURATION;
  const offset = TIMER_CIRCUMFERENCE * (1 - fraction);
  arc.style.strokeDasharray = TIMER_CIRCUMFERENCE;
  arc.style.strokeDashoffset = offset;
  num.textContent = timerValue;

  // Colores urgencia
  arc.classList.remove('urgent', 'critical');
  num.classList.remove('urgent', 'critical');
  if (timerValue <= 5) {
    arc.classList.add('critical');
    num.classList.add('critical');
  } else if (timerValue <= 10) {
    arc.classList.add('urgent');
    num.classList.add('urgent');
  }
}

// Escuchar mensajes SSE o WS que traigan qnum nuevo para resetear el timer
function onNewQuestion() {
  startTimer();
}

// ═══════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════
async function initCamera() {
  try {
    if(S.stream) S.stream.getTracks().forEach(t=>t.stop());
    const constraints = {
      video: {
        facingMode: S.facingFront ? 'user' : 'environment',
        width:  { ideal: QUALITY_LEVELS[qualIdx].maxW },
        height: { ideal: Math.round(QUALITY_LEVELS[qualIdx].maxW * 0.75) },
        frameRate: { ideal: 30 },
      },
      audio: false,
    };
    S.stream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('video');
    video.srcObject = S.stream;
    video.className = S.facingFront ? '' : 'rear';
    await video.play();
    S.cameraReady = true;
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('overlay').style.display = 'block';
    toast('📷 Cámara lista');
  } catch(e) {
    toast('❌ Error cámara: ' + e.message);
  }
}

function toggleCamera() {
  S.facingFront = !S.facingFront;
  if(S.cameraReady) initCamera();
}

// ═══════════════════════════════════════════════════
//  CAPTURE
// ═══════════════════════════════════════════════════
function capture() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('snap');
  if(!S.cameraReady || video.readyState < 2) return null;

  const maxW = QUALITY_LEVELS[qualIdx].maxW;
  const vw = video.videoWidth || 1280;
  const vh = video.videoHeight || 720;
  const scale = Math.min(1, maxW / vw);
  canvas.width  = Math.round(vw * scale);
  canvas.height = Math.round(vh * scale);

  const ctx = canvas.getContext('2d');
  if(S.facingFront) {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  if(S.facingFront) ctx.setTransform(1,0,0,1,0,0);

  let q = QUALITY_LEVELS[qualIdx].q;
  if(S.lastKB > S.targetMaxKB) {
    q = Math.max(0.3, q * (S.targetMaxKB / S.lastKB));
  }

  const dataUrl = canvas.toDataURL('image/jpeg', q);
  const b64 = dataUrl.split(',')[1];
  const bytes = Math.round(b64.length * 0.75);
  const kb = Math.round(bytes / 1024);
  S.lastKB = kb;

  return { dataUrl, b64, kb, mime: 'image/jpeg', q };
}

// ═══════════════════════════════════════════════════
//  WEBSOCKET
// ═══════════════════════════════════════════════════
function buildWsUrl(base) {
  const u = base.replace(/\/$/, '');
  if(u.startsWith('wss://') || u.startsWith('ws://')) return u + '/ws';
  return u.replace(/^https?:\/\//, m => m === 'https://' ? 'wss://' : 'ws://') + '/ws';
}

function connect() {
  S.srvUrl   = location.origin;
  S.protocol = document.getElementById('protoSel').value;
  if(S.protocol === 'ws') connectWS();
  else { setDot('on', 'HTTP listo'); }
  if(!S.cameraReady) initCamera();
}

function connectWS() {
  if(S.ws) { try{S.ws.close()}catch(e){} }
  setDot('wait', 'Conectando WS…');

  try {
    const wsUrl = buildWsUrl(S.srvUrl) + '?user=' + S.user;
    S.ws = new WebSocket(wsUrl);
    S.ws.binaryType = 'arraybuffer';

    S.ws.onopen = () => {
      S.wsReady = true;
      setDot('on', 'WS conectado ⚡');
      toast('⚡ WebSocket conectado');
    };
    S.ws.onclose = () => {
      S.wsReady = false;
      setDot('err', 'WS desconectado');
      setTimeout(() => { if(S.protocol==='ws') connectWS(); }, 3000);
    };
    S.ws.onerror = () => {
      setDot('err', 'Error WS');
    };
    S.ws.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if(d.ok) { S.ok++; updStats(); return; }
        if(d.type === 'capture') {
          sendFrame();
          toast('📸 Captura remota');
        } else if(d.type === 'auto_start') {
          if(!S.autoMode) toggleAuto();
          toast('▶️ Auto iniciado por monitor');
        } else if(d.type === 'auto_stop') {
          if(S.autoMode) toggleAuto();
          toast('⏹ Auto detenido por monitor');
        } else if(d.type === 'new_question') {
          // Monitor detectó pregunta nueva → iniciar temporizador
          onNewQuestion();
        }
      } catch(ex){}
    };
  } catch(e) {
    setDot('err', 'URL inválida');
  }
}

// ═══════════════════════════════════════════════════
//  SEND
// ═══════════════════════════════════════════════════
async function sendFrame() {
  if(!S.cameraReady) { toast('Inicia la cámara primero'); return; }
  if(S.pendingSend) return;
  S.pendingSend = true;

  const cap = capture();
  if(!cap) { S.pendingSend = false; return; }

  doFlash();
  document.getElementById('thumbImg').src = cap.dataUrl;
  document.getElementById('thumbWrap').style.display = 'block';

  S.sent++;
  document.getElementById('sizeVal').textContent = cap.kb + 'KB';
  document.getElementById('stKb').textContent = cap.kb;
  document.getElementById('stSent').textContent = S.sent;

  const now = Date.now();
  S.fpsTimes.push(now);
  S.fpsTimes = S.fpsTimes.filter(t => now - t < 2000);
  const fps = S.fpsTimes.length > 1
    ? Math.round((S.fpsTimes.length - 1) / ((now - S.fpsTimes[0]) / 1000) * 10) / 10
    : 0;
  document.getElementById('fpsVal').textContent = fps.toFixed(1);

  try {
    if(S.protocol === 'ws' && S.wsReady) {
      await sendWS(cap);
    } else {
      await sendHTTP(cap);
    }
    S.ok++;
  } catch(e) {
    S.err++;
    document.getElementById('connDot').className = 'dot err';
  } finally {
    S.pendingSend = false;
    updStats();
  }
}

async function sendWS(cap) {
  const payload = JSON.stringify({
    user: S.user,
    ts: Date.now(),
    mime: cap.mime,
    sizeKB: cap.kb,
    deviceName: S.deviceName,
    data: cap.b64,
  });
  S.ws.send(payload);
}

async function sendHTTP(cap) {
  const url = S.srvUrl + '/upload/' + S.user;
  if(cap.kb > 80) {
    const blob = await dataUrlToBlob(cap.dataUrl);
    const fd = new FormData();
    fd.append('image', blob, 'frame.jpg');
    fd.append('ts', Date.now());
    fd.append('deviceName', S.deviceName);
    fd.append('sizeKB', cap.kb);
    const r = await fetch(url, { method: 'POST', body: fd });
    if(!r.ok) throw new Error('HTTP ' + r.status);
  } else {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ts: Date.now(), mime: cap.mime, sizeKB: cap.kb, deviceName: S.deviceName, data: cap.b64 }),
    });
    if(!r.ok) throw new Error('HTTP ' + r.status);
  }
}

function dataUrlToBlob(dataUrl) {
  return new Promise(res => {
    const [header, b64] = dataUrl.split(',');
    const mime = header.match(/:(.*?);/)[1];
    const binary = atob(b64);
    const ab = new ArrayBuffer(binary.length);
    const ia = new Uint8Array(ab);
    for(let i=0;i<binary.length;i++) ia[i]=binary.charCodeAt(i);
    res(new Blob([ab], {type:mime}));
  });
}

// ═══════════════════════════════════════════════════
//  AUTO MODE
// ═══════════════════════════════════════════════════
function toggleAuto() {
  S.autoMode = !S.autoMode;
  document.getElementById('optAuto').classList.toggle('active', S.autoMode);
  document.getElementById('autoIco').textContent = S.autoMode ? '⏹' : '▶️';
  document.getElementById('recBadge').style.display = S.autoMode ? 'flex' : 'none';
  document.getElementById('btnShoot').className = 'btn-shoot' + (S.autoMode ? ' auto' : '');
  document.getElementById('modeLabel').textContent = S.autoMode ? 'Auto activo' : 'Manual';
  document.getElementById('btnLabel').textContent = S.autoMode ? 'Detener' : 'Capturar';

  if(S.autoMode) {
    scheduleAuto();
  } else {
    clearTimeout(S.autoTimer);
    S.autoTimer = null;
  }
}

function scheduleAuto() {
  if(!S.autoMode) return;
  S.autoTimer = setTimeout(async () => {
    await sendFrame();
    scheduleAuto();
  }, S.interval);
}

// ═══════════════════════════════════════════════════
//  UI HANDLERS
// ═══════════════════════════════════════════════════
async function onShoot() {
  if(S.autoMode) { toggleAuto(); return; }
  if(!S.cameraReady) { await initCamera(); return; }
  await sendFrame();
}

function onIntervalChange(val) {
  S.interval = parseInt(val);
  const s = (S.interval / 1000).toFixed(1);
  document.getElementById('intervalVal').textContent = s + ' s';
  document.getElementById('recLabel').textContent = 'AUTO ' + s + 's';
  if(S.autoMode) {
    clearTimeout(S.autoTimer);
    scheduleAuto();
  }
}

function cycleQuality() {
  qualIdx = (qualIdx + 1) % QUALITY_LEVELS.length;
  const ql = QUALITY_LEVELS[qualIdx];
  document.getElementById('qLabel').textContent = ql.label;
  toast('🎯 Calidad: ' + ql.label + ' (' + Math.round(ql.q*100) + '%)');
}

function cycleUser() {
  S.user = S.user === 1 ? 2 : 1;
  document.getElementById('uLabel').textContent = 'U' + S.user;
  document.getElementById('userTag').textContent = 'U' + S.user;
  if(S.protocol === 'ws' && S.srvUrl) connectWS();
}

function toggleCfg() {
  const panel = document.getElementById('cfgPanel');
  const btn   = document.getElementById('cfgToggleBtn');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function setDot(state, txt) {
  const d = document.getElementById('connDot');
  d.className = 'dot' + (state==='on'?' on':state==='err'?' err':state==='wait'?' wait':'');
  document.getElementById('connTxt').textContent = txt;
}

function updStats() {
  document.getElementById('stOk').textContent  = S.ok;
  document.getElementById('stErr').textContent = S.err;
}

function doFlash() {
  const f = document.getElementById('flash');
  f.classList.add('go');
  setTimeout(() => f.classList.remove('go'), 100);
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
(function init() {
  const params = new URLSearchParams(location.search);
  const user = params.get('u');
  if(user && (user==='1'||user==='2')) {
    S.user = parseInt(user);
    document.getElementById('uLabel').textContent = 'U' + S.user;
    document.getElementById('userTag').textContent = 'U' + S.user;
  }
  S.srvUrl = location.origin;
  setTimeout(() => connect(), 500);

  // Inicializar el arco del temporizador
  const arc = document.getElementById('timerArc');
  arc.style.strokeDasharray = TIMER_CIRCUMFERENCE;
  arc.style.strokeDashoffset = 0;
})();

// Prevent zoom on double tap
let lastTap=0;
document.addEventListener('touchend', e => {
  const now=Date.now();
  if(now-lastTap<300) e.preventDefault();
  lastTap=now;
},{passive:false});
</script>
